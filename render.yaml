services:
  - type: web
    name: taxi-bot-rto
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false  # Задаётся вручную в панели Render
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
      - key: DB_PATH
        value: "/tmp/taxi_bot.db"  # SQLite в tmp (сохраняется между перезапусками в пределах одного инстанса)
